<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduGestão - Diário de Classe</title>

    <link rel="stylesheet" href="diario.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <i class="fa-solid fa-graduation-cap"></i>
        <span>EduGestão</span>
    </div>

    <a href="index.html" class="btn-admin">
        <i class="fa-solid fa-house"></i>
        Início
    </a>
</header>

<main class="main-container">

    <section class="page-header">
        <h1>Diário de Classe</h1>
        <p>
            Gerencie as notas, controle de frequência e acompanhe a situação de aprovação dos alunos.
        </p>
    </section>

    <section class="filters-section">
        <div class="filter-group">
            <label>Turma:</label>
            <select>
                <option>3º Ano A - Ensino Médio</option>
                <option>3º Ano B - Ensino Médio</option>
                <option>2º Ano A - Ensino Médio</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Disciplina:</label>
            <select>
                <option>Matemática</option>
                <option>Português</option>
                <option>História</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Bimestre:</label>
            <select>
                <option>1º Bimestre</option>
                <option>2º Bimestre</option>
                <option>3º Bimestre</option>
                <option>4º Bimestre</option>
            </select>
        </div>
    </section>

    <section class="table-container">

        <div class="table-actions">
            <h3>Lista de Alunos</h3>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="search-student"
                    placeholder="Buscar aluno pelo nome..."
                >
            </div>

            <button class="btn-save">
                <i class="fa-solid fa-floppy-disk"></i>
                Salvar Alterações
            </button>
        </div>

        <div class="responsive-table">
            <table>
                <thead>
                <tr>
                    <th>Matrícula</th>
                    <th>Nome do Aluno</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Média</th>
                    <th>Presenças</th>
                    <th>Faltas</th>
                    <th>Situação</th>
                </tr>
                </thead>

                <tbody id="lista-alunos">
                    <tr>
                        <td colspan="8" style="text-align:center">
                            Carregando alunos...
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>
    </section>

</main>

<footer class="footer">
    <p>&copy; 2026 EduGestão. Todos os direitos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL =
'https://slfcjvwsoyucjbymnuaw.supabase.co';

const SUPABASE_ANON_KEY =
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsZmNqdndzb3l1Y2pieW1udWF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0NTU4NTIsImV4cCI6MjA5OTAzMTg1Mn0.rq8pFIiYozatMtKKork4gsoGyMTsi2og470stWeW05c';

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

function calcularMedia(n1, n2) {
    n1 = Number(n1) || 0;
    n2 = Number(n2) || 0;

    return ((n1 + n2) / 2).toFixed(1);
}

function gerarSituacao(media) {
    media = Number(media);

    if (media >= 7) {
        return '<span class="badge status-aprovado">Aprovado</span>';
    }

    if (media >= 5) {
        return '<span class="badge status-recuperacao">Recuperação</span>';
    }

    return '<span class="badge status-reprovado">Reprovado</span>';
}

async function carregarAlunos() {
    const tbody = document.getElementById('lista-alunos');

    try {
        const { data, error } = await supabaseClient
            .from('alunos')
            .select('*')
            .order('nome');

        if (error) throw error;

        tbody.innerHTML = '';

        if (!data || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8">
                        Nenhum aluno cadastrado.
                    </td>
                </tr>
            `;
            return;
        }

        data.forEach(aluno => {
            const nota1 = Number(aluno.nota1) || 0;
            const nota2 = Number(aluno.nota2) || 0;
            const media = calcularMedia(nota1, nota2);

            const tr = document.createElement('tr');

            tr.innerHTML = `
                <td>${aluno.matricula || '-'}</td>
                <td class="student-name">${aluno.nome || '-'}</td>

                <td>
                    <input type="number"
                           class="input-nota"
                           value="${nota1}">
                </td>

                <td>
                    <input type="number"
                           class="input-nota"
                           value="${nota2}">
                </td>

                <td class="text-center font-bold">
                    ${media}
                </td>

                <td>
                    <input type="number"
                           class="input-frequencia"
                           value="${aluno.presencas || 0}">
                </td>

                <td>
                    <input type="number"
                           class="input-frequencia"
                           value="${aluno.faltas || 0}">
                </td>

                <td class="text-center">
                    ${gerarSituacao(media)}
                </td>
            `;

            tbody.appendChild(tr);
        });

    } catch (err) {
        console.error(err);

        tbody.innerHTML = `
            <tr>
                <td colspan="8">
                    Erro ao carregar alunos.
                </td>
            </tr>
        `;
    }
}

document
.getElementById('search-student')
.addEventListener('input', function () {

    const texto = this.value.toLowerCase();

    document
    .querySelectorAll('#lista-alunos tr')
    .forEach(linha => {
        const nome =
            linha.querySelector('.student-name');

        if (!nome) return;

        linha.style.display =
            nome.textContent
                .toLowerCase()
                .includes(texto)
                    ? ''
                    : 'none';
    });
});

document.addEventListener(
    'DOMContentLoaded',
    carregarAlunos
);
</script>

</body>
</html>
