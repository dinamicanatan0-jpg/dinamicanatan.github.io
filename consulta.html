<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar Alunos - EduGestão</title>

  <link rel="stylesheet" href="consulta.css">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
  <h2>
    <i class="fas fa-graduation-cap"></i>
    EduGestão
  </h2>
</header>

<main class="container">

  <div class="topo">

    <button class="btn-voltar" onclick="voltar()">
      <i class="fas fa-arrow-left"></i>
      Voltar
    </button>

    <h1>Consultar Alunos</h1>

    <p>
      Pesquise ou visualize todos os alunos cadastrados.
    </p>

  </div>

  <div class="painel">
    <div class="card">
      <h3>Total de Matrículas</h3>
      <span id="totalMatriculas">0</span>
    </div>
  </div>

  <div class="pesquisa">

    <input
      type="text"
      id="matricula"
      placeholder="Digite a matrícula">

    <button type="button" onclick="buscarAluno()">
      <i class="fas fa-search"></i>
      Buscar
    </button>

    <button type="button" onclick="carregarAlunos()">
      <i class="fas fa-list"></i>
      Mostrar Todos
    </button>

  </div>

  <section>

    <h2>Lista de Alunos</h2>

    <div id="listaAlunos" class="lista">

      <p class="carregando">
        Carregando alunos...
      </p>

    </div>

  </section>

</main>

<footer>
  © 2026 EduGestão. Todos os direitos reservados.
</footer>

<script src="consulta.js"></script>

</body>
</html>
